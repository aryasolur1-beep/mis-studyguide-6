<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 6: Hardware & Innovation</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0B0E14;
            --surface: #161B22;
            --accent: #58A6FF;
            --text-main: #E6EDF3;
            --text-dim: #8B949E;
            --correct: #238636;
            --wrong: #DA3633;
            --border: #30363D;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Navigation Sidebar */
        nav {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
        }

        nav h1 { font-size: 1.5rem; margin-bottom: 2rem; color: var(--accent); }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
        }

        .nav-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        /* Main Content */
        main {
            margin-left: 260px;
            padding: 3rem;
            width: 100%;
            max-width: 1000px;
        }

        .section { display: none; }
        .section.active { display: block; }

        /* Vocab Cards */
        .search-bar {
            width: 100%;
            padding: 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            margin-bottom: 2rem;
        }

        .vocab-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .vocab-card h3 { color: var(--accent); margin-bottom: 1rem; font-size: 1.4rem; }
        
        .label { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 0.75rem; 
            color: var(--text-dim); 
            text-transform: uppercase;
            display: block;
            margin-top: 1rem;
        }

        .example-box {
            background: rgba(88, 166, 255, 0.05);
            border-left: 3px solid var(--accent);
            padding: 1rem;
            margin-top: 1rem;
            font-style: italic;
        }

        /* Quiz Styles */
        .q-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .option {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-top: 0.5rem;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
        }

        .option:hover { border-color: var(--accent); }
        .option.correct { background: var(--correct); border-color: var(--correct); }
        .option.wrong { background: var(--wrong); border-color: var(--wrong); }

        .explanation {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 6px;
            display: none;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            nav { width: 100%; height: auto; position: relative; }
            main { margin-left: 0; padding: 1.5rem; }
            body { flex-direction: column; }
        }
    </style>
</head>
<body>

<nav>
    <h1>MIS Unit 6</h1>
    <button class="nav-btn active" onclick="showTab('vocab')">Terms</button>
    <button class="nav-btn" onclick="showTab('quiz')">Practice Quiz</button>
    <div style="margin-top: 2rem; font-size: 0.8rem; color: var(--text-dim);">
        Focus: Hardware, Moore's Law, and E-Waste.
    </div>
</nav>

<main>
    <section id="vocab" class="section active">
        <input type="text" class="search-bar" id="search" placeholder="Search Unit 6 terms..." onkeyup="filterVocab()">
        <div id="vocab-container"></div>
    </section>

    <section id="quiz" class="section">
        <div id="quiz-container"></div>
    </section>
</main>

<script>
    const vocabData = [
        {
            term: "Moore's Law",
            exact: "The observation that the number of transistors in a dense integrated circuit doubles approximately every two years.",
            simple: "Computers get twice as fast (or half as expensive) every two years.",
            example: "The smartphone in your pocket is significantly more powerful than the room-sized supercomputers used by NASA in the 1960s, thanks to 60 years of Moore's Law."
        },
        {
            term: "Volatile Memory",
            exact: "Storage that is wiped clean when power is cut from a device.",
            simple: "Temporary storage that needs electricity to keep your data.",
            example: "RAM (Random Access Memory) is volatile. If your computer crashes before you hit 'Save,' the work currently held in RAM is lost because it requires constant power."
        },
        {
            term: "Non-volatile Memory",
            exact: "Storage that retains data even when a device is powered down.",
            simple: "Permanent storage that keeps your files safe even when the power is off.",
            example: "Flash drives and SSDs (Solid State Drives) are non-volatile. You can unplug a USB stick for a year, and your photos will still be there when you plug it back in."
        },
        {
            term: "Price Elasticity",
            exact: "The rate at which the demand for a product or service fluctuates with price change.",
            simple: "How much people buy a product when the price goes up or down.",
            example: "Technology has high price elasticity. As Moore's Law makes chips cheaper, new markets open up—suddenly, it’s cheap enough to put a computer inside a toaster or a lightbulb."
        },
        {
            term: "Internet of Things (IoT)",
            exact: "A vision where low-cost sensors, processors, and communication are embedded into a wide array of products and our environment.",
            simple: "Adding 'brains' and internet connectivity to everyday objects.",
            example: "A 'Smart' refrigerator that tracks expiration dates and sends a shopping list to your phone is a classic example of an IoT device."
        }
    ];

    const quizData = [
        {
            q: "A logistics company wants to install sensors on 5,000 delivery trucks to monitor engine health and fuel efficiency in real-time. This massive expansion of 'connected' hardware is best described as:",
            options: ["A. Quantum Computing", "B. The Internet of Things (IoT)", "C. Price Elasticity", "D. Volatile Storage"],
            correct: 1,
            exp: "Correct! IoT refers to embedding sensors and connectivity into physical objects to gather and exchange data. A is wrong as Quantum computing is a different processing method. C refers to demand fluctuations, and D is temporary memory."
        },
        {
            q: "You are working on a massive Excel spreadsheet. Suddenly, the power goes out in your office. When you reboot, your recent unsaved changes are gone. Which hardware component was responsible for this loss?",
            options: ["A. Non-volatile Storage", "B. The Microprocessor", "C. Volatile RAM", "D. The Motherboard"],
            correct: 2,
            exp: "Correct! RAM is volatile memory, meaning it requires power to maintain data. If power is lost, anything not saved to non-volatile storage (like a Hard Drive/SSD) is deleted."
        },
        {
            q: "Which of the following is the most significant social/environmental downside resulting from the rapid pace of Moore's Law?",
            options: ["A. Lower price elasticity", "B. Increased E-waste", "C. Improved microprocessors", "D. Slower innovation cycles"],
            correct: 1,
            exp: "Correct! Because Moore's Law makes tech obsolete so quickly (often in 2-3 years), it creates a massive stream of 'E-waste' (electronic waste) that is difficult and toxic to recycle."
        },
        {
            q: "As the cost of producing 1 gigabyte of storage has plummeted over the last decade, companies have found ways to use storage in products that never had it before (like smart toys). This trend demonstrates:",
            options: ["A. Low Price Elasticity", "B. High Price Elasticity", "C. The Volatility of Data", "D. Software Ecosystem Lock-in"],
            correct: 1,
            exp: "Correct! High price elasticity means that as the price of tech drops, the demand for it—and the number of ways it is used—explodes into new markets."
        },
        {
            q: "A manager is worried that the company's server room is getting too hot and using too much electricity. They are looking for a new type of chip that can handle more data without the heat of traditional processors. Which emerging field might solve this?",
            options: ["A. Non-volatile Storage", "B. E-waste Management", "C. Quantum Computing", "D. Conventional Microprocessors"],
            correct: 2,
            exp: "Correct! Quantum computing uses different physics (qubits) to potentially solve complex problems much faster and more efficiently than traditional chips, though it is still in early development."
        }
    ];

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    function renderVocab() {
        const container = document.getElementById('vocab-container');
        container.innerHTML = vocabData.map(item => `
            <div class="vocab-card">
                <h3>${item.term}</h3>
                <span class="label">Exact Definition</span>
                <p>${item.exact}</p>
                <span class="label">Simple Definition</span>
                <p>${item.simple}</p>
                <div class="example-box">
                    <span class="label" style="margin-top:0">Example</span>
                    ${item.example}
                </div>
            </div>
        `).join('');
    }

    function filterVocab() {
        const query = document.getElementById('search').value.toLowerCase();
        const cards = document.querySelectorAll('.vocab-card');
        cards.forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(query) ? 'block' : 'none';
        });
    }

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = quizData.map((item, i) => `
            <div class="q-card" id="q${i}">
                <p><strong>Question ${i+1}:</strong> ${item.q}</p>
                ${item.options.map((opt, oi) => `
                    <button class="option" onclick="checkAnswer(${i}, ${oi})">${opt}</button>
                `).join('')}
                <div class="explanation" id="exp${i}"></div>
            </div>
        `).join('');
    }

    function checkAnswer(qIdx, oIdx) {
        const q = quizData[qIdx];
        const card = document.getElementById(`q${qIdx}`);
        const options = card.querySelectorAll('.option');
        const exp = document.getElementById(`exp${qIdx}`);

        options.forEach(btn => btn.disabled = true);
        
        if (oIdx === q.correct) {
            options[oIdx].classList.add('correct');
            exp.style.background = "rgba(35, 134, 54, 0.2)";
        } else {
            options[oIdx].classList.add('wrong');
            options[q.correct].classList.add('correct');
            exp.style.background = "rgba(218, 54, 51, 0.2)";
        }

        exp.innerHTML = q.exp;
        exp.style.display = "block";
    }

    renderVocab();
    renderQuiz();
</script>

</body>
</html>
