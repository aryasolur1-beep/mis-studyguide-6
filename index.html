<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIS Chapter 6 Study Guide</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0B0E14;
            --surface: #161B22;
            --accent: #58A6FF;
            --text-main: #E6EDF3;
            --text-dim: #8B949E;
            --correct: #238636;
            --wrong: #DA3633;
            --border: #30363D;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        nav {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        nav h1 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--accent);
        }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
        }

        .nav-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        main {
            margin-left: 260px;
            padding: 3rem;
            width: 100%;
            max-width: 1100px;
        }

        .section { display: none; }
        .section.active { display: block; }

        .search-bar {
            width: 100%;
            padding: 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            margin-bottom: 2rem;
        }

        .vocab-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .vocab-card h3 {
            color: var(--accent);
            margin-bottom: 1rem;
            font-size: 1.4rem;
        }

        .label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            display: block;
            margin-top: 1rem;
        }

        .example-box {
            background: rgba(88, 166, 255, 0.05);
            border-left: 3px solid var(--accent);
            padding: 1rem;
            margin-top: 1rem;
            font-style: italic;
        }

        .q-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .q-number {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .scenario {
            line-height: 1.65;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .question-line {
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .option {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-top: 0.6rem;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }

        .option:hover {
            border-color: var(--accent);
        }

        .option.correct {
            background: var(--correct);
            border-color: var(--correct);
        }

        .option.wrong {
            background: var(--wrong);
            border-color: var(--wrong);
        }

        .answer-block {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 6px;
            display: none;
            font-size: 0.95rem;
            line-height: 1.6;
            border: 1px solid var(--border);
        }

        .answer-block strong {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            nav {
                width: 100%;
                height: auto;
                position: relative;
            }

            main {
                margin-left: 0;
                padding: 1.5rem;
            }

            body {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<nav>
    <h1>MIS Chapter 6</h1>
    <button class="nav-btn active" onclick="showTab('vocab', this)">Terms</button>
    <button class="nav-btn" onclick="showTab('quiz', this)">Practice Quiz</button>
    <div style="margin-top: 2rem; font-size: 0.8rem; color: var(--text-dim); line-height: 1.5;">
        Focus: hardware, computing power, storage, IoT, Moore's Law, and related technology concepts.
    </div>
</nav>

<main>
    <section id="vocab" class="section active">
        <input type="text" class="search-bar" id="search" placeholder="Search Chapter 6 terms..." onkeyup="filterVocab()">
        <div id="vocab-container"></div>
    </section>

    <section id="quiz" class="section">
        <div id="quiz-container"></div>
    </section>
</main>

<script>
const vocabData = [
    {
        term: "eWaste",
        exact: "Discarded electronic devices such as computers, phones, and appliances that require proper recycling or disposal.",
        simple: "Old or broken electronics that need to be thrown away safely.",
        example: "Throwing away an old laptop instead of recycling it contributes to eWaste."
    },
    {
        term: "Internet of Things (IoT)",
        exact: "A network of physical devices embedded with sensors, software, and connectivity that allows them to collect and exchange data.",
        simple: "Everyday devices connected to the internet that can send and receive data.",
        example: "A smart thermostat that adjusts temperature automatically is part of IoT."
    },
    {
        term: "Konana's Model of the Software Ecosystem",
        exact: "A model that explains how software creates value through interactions between users, developers, platforms, and complementary products.",
        simple: "Software becomes more valuable when more people and tools connect to it.",
        example: "An app store grows stronger as more developers create apps and more users join."
    },
    {
        term: "Memory",
        exact: "Temporary storage used by a computer to hold data and instructions that are actively being processed.",
        simple: "Short-term storage a computer uses while working on tasks.",
        example: "When you open multiple tabs, your computer uses memory to keep them running."
    },
    {
        term: "Microprocessor",
        exact: "The central processing unit (CPU) of a computer on a single integrated circuit that executes instructions and processes data.",
        simple: "The brain of the computer that does calculations and runs programs.",
        example: "Your laptop’s microprocessor runs apps like Chrome and Excel."
    },
    {
        term: "Moore's Law",
        exact: "The observation that the number of transistors on a microprocessor doubles approximately every two years, increasing computing power while reducing cost.",
        simple: "Computers keep getting faster and cheaper over time.",
        example: "New smartphones are more powerful than older ones but cost about the same."
    },
    {
        term: "Non-volatile",
        exact: "Type of storage that retains data even when the power is turned off.",
        simple: "Storage that keeps data even when the device is off.",
        example: "Files saved on a hard drive remain after shutting down the computer."
    },
    {
        term: "Price elasticity",
        exact: "A measure of how sensitive the demand for a product is to changes in its price.",
        simple: "How much demand changes when price goes up or down.",
        example: "If raising the price of an app causes many users to leave, demand is elastic."
    },
    {
        term: "Quantum computing",
        exact: "A type of computing that uses quantum bits (qubits) and quantum mechanics to perform complex calculations much faster than traditional computers.",
        simple: "A new kind of computing that can solve very complex problems much faster.",
        example: "Quantum computers may help solve advanced problems in chemistry or logistics."
    },
    {
        term: "Storage",
        exact: "Hardware used to permanently store data, programs, and files for later use.",
        simple: "Where a computer keeps files long-term.",
        example: "Photos saved on your laptop are stored in storage, not memory."
    },
    {
        term: "Volatile",
        exact: "Type of memory that loses its contents when power is turned off.",
        simple: "Memory that gets erased when the device is turned off.",
        example: "RAM is volatile, so unsaved work disappears after shutdown."
    }
];

const quizData = [
    {
        scenario: "A student buys a new laptop for business school. She notices that the laptop opens apps quickly, saves files even after shutdown, and can keep several browser tabs open at once. Her professor asks her to think carefully about which hardware terms explain each of those functions.",
        question: "Which statement BEST matches the role of memory in this scenario?",
        options: [
            "A. Memory permanently stores files for years after the laptop is turned off",
            "B. Memory temporarily holds data and instructions while tasks are running",
            "C. Memory connects devices to the internet through embedded sensors",
            "D. Memory is the main processor that executes all computer instructions"
        ],
        correct: 1,
        explanation: "Memory is correct because it temporarily holds data and instructions that are actively being used. A is wrong because permanent storage is handled by storage devices, not memory. C is wrong because that describes IoT-related connectivity, not memory. D is wrong because the microprocessor, not memory, executes instructions."
    },
    {
        scenario: "A campus startup is designing smart refrigerators for student apartments. The refrigerators track food use, send alerts to a phone, and can automatically suggest grocery lists. The founders say the product creates value because it collects and shares data through internet connectivity.",
        question: "Which concept BEST describes the smart refrigerator system?",
        options: [
            "A. Internet of Things (IoT) because connected devices exchange data",
            "B. eWaste because appliances eventually need to be recycled",
            "C. Volatile because the refrigerator loses data when power goes off",
            "D. Storage because the device holds files over time"
        ],
        correct: 0,
        explanation: "IoT is correct because the refrigerator is a physical device connected to the internet that collects and exchanges data. B is wrong because eWaste refers to discarded electronics, not active smart products. C is wrong because the scenario focuses on connected functionality, not temporary memory behavior. D is wrong because storage may exist in the device, but the main idea is internet-connected smart functionality."
    },
    {
        scenario: "A manager at a tech store explains that each new generation of chips seems to deliver more power for a similar price. Because of that trend, customers expect better devices every few years without huge price increases. The manager uses this pattern to explain why computing products improve so rapidly.",
        question: "Which concept BEST explains the manager’s point?",
        options: [
            "A. Price elasticity because demand changes when prices rise",
            "B. Quantum computing because qubits solve every consumer problem faster",
            "C. Moore's Law because chip power tends to grow as costs fall over time",
            "D. Konana's Model because more developers improve hardware performance"
        ],
        correct: 2,
        explanation: "Moore's Law is correct because it describes the long-run trend of increasing chip power and lower cost per unit of computing capability. A is wrong because price elasticity is about demand response to price, not chip performance trends. B is wrong because quantum computing is a different emerging computing model, not the general pattern behind ordinary chip improvement. D is wrong because Konana's Model explains software ecosystems, not hardware scaling."
    },
    {
        scenario: "A student forgets to save a document before her laptop battery dies. When she restarts the computer, the unsaved work is gone, but her older saved files are still there. Her professor uses this as an example of two different kinds of computer data behavior.",
        question: "Which pair of concepts BEST explains what happened?",
        options: [
            "A. Volatile memory lost the unsaved work, while non-volatile storage kept saved files",
            "B. IoT devices lost the file, while eWaste protected the saved copy",
            "C. Microprocessors erased the document, while quantum computing restored old files",
            "D. Price elasticity changed the file demand, while storage increased market value"
        ],
        correct: 0,
        explanation: "Volatile memory and non-volatile storage is the correct pair because volatile memory loses contents when power is lost, while non-volatile storage keeps saved files. B is wrong because IoT and eWaste are unrelated to this file-loss behavior. C is wrong because the microprocessor does not work the way described, and quantum computing is irrelevant here. D is wrong because price elasticity has nothing to do with file retention."
    },
    {
        scenario: "A professor discusses a future technology that may solve certain complex problems much faster than traditional computers by using qubits instead of standard binary bits. He warns students not to confuse this idea with the normal improvement pattern of ordinary chips. He says it is promising, but still different from everyday laptops and phones.",
        question: "Which concept is the professor describing?",
        options: [
            "A. Microprocessor",
            "B. Quantum computing",
            "C. Storage",
            "D. Moore's Law"
        ],
        correct: 1,
        explanation: "Quantum computing is correct because the scenario specifically mentions qubits and solving some complex problems differently from traditional computers. A is wrong because a microprocessor is the CPU in a conventional computer. C is wrong because storage is where data is kept, not a new computation model. D is wrong because Moore's Law describes a trend in chip improvement, not qubit-based computing."
    }
];

function showTab(id, el) {
    document.querySelectorAll('.section').forEach(section => section.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
}

function renderVocab() {
    const container = document.getElementById('vocab-container');
    container.innerHTML = vocabData.map(item => `
        <div class="vocab-card">
            <h3>${item.term}</h3>
            <span class="label">Exact Definition</span>
            <p>${item.exact}</p>
            <span class="label">Simple Definition</span>
            <p>${item.simple}</p>
            <div class="example-box">
                <span class="label" style="margin-top:0">Example</span>
                ${item.example}
            </div>
        </div>
    `).join('');
}

function filterVocab() {
    const query = document.getElementById('search').value.toLowerCase();
    const cards = document.querySelectorAll('.vocab-card');
    cards.forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(query) ? 'block' : 'none';
    });
}

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = quizData.map((item, i) => `
        <div class="q-card" id="q${i}">
            <div class="q-number">${i + 1}.</div>
            <p class="scenario">${item.scenario}</p>
            <p class="question-line">${item.question}</p>
            ${item.options.map((opt, oi) => `
                <button class="option" onclick="checkAnswer(${i}, ${oi})">${opt}</button>
            `).join('')}
            <div class="answer-block" id="exp${i}">
                <p><strong>Correct answer:</strong> ${String.fromCharCode(65 + item.correct)}</p>
                <p><strong>Explanation:</strong> ${item.explanation}</p>
            </div>
        </div>
    `).join('');
}

function checkAnswer(qIdx, oIdx) {
    const q = quizData[qIdx];
    const card = document.getElementById(`q${qIdx}`);
    const options = card.querySelectorAll('.option');
    const exp = document.getElementById(`exp${qIdx}`);

    options.forEach(btn => btn.disabled = true);

    if (oIdx === q.correct) {
        options[oIdx].classList.add('correct');
        exp.style.background = "rgba(35, 134, 54, 0.12)";
    } else {
        options[oIdx].classList.add('wrong');
        options[q.correct].classList.add('correct');
        exp.style.background = "rgba(218, 54, 51, 0.12)";
    }

    exp.style.display = "block";
}

renderVocab();
renderQuiz();
</script>

</body>
</html>
